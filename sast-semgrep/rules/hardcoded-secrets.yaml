rules:
  - id: python-hardcoded-password
    patterns:
      - pattern-either:
          - pattern: |
              $KEY = "..."
          - pattern: |
              $KEY = '...'
      - metavariable-regex:
          metavariable: $KEY
          regex: (password|passwd|api_key|secret|token|auth)
      - pattern-not: |
          $KEY = "test_..."
      - pattern-not: |
          $KEY = "...example..."
    message: "Hardcoded secret: обнаружена переменная с именем '$KEY', содержащая статическое значение. Использую переменные окружения или менеджеры секретов"
    languages:
      - python
    severity: ERROR
    metadata:
      cwe: "CWE-798"
      owasp: "A07:2021 - Identification and Authentication Failures"
